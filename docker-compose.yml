version: '3.8'

services:
  # Backend Bike Segura
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bike-segura-backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGODB_URI=${MONGODB_URI}
      - JWT_SECRET=${JWT_SECRET}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - ASAAS_API_KEY=${ASAAS_API_KEY}
      - EVOLUTION_API_URL=http://evolution:8080
      - EVOLUTION_API_KEY=${EVOLUTION_API_KEY:-bike-segura-bc-2024}
      - WEBHOOK_BASE_URL=${WEBHOOK_BASE_URL}
    depends_on:
      - evolution
    networks:
      - bike-segura-net

  # Evolution API - WhatsApp
  evolution:
    image: atendai/evolution-api:latest
    container_name: bike-segura-evolution
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=https://www.bikesegurabc.com.br/evolution
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY:-bike-segura-bc-2024}
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
      - DATABASE_ENABLED=true
      - DATABASE_CONNECTION_URI=${MONGODB_URI}
      - DATABASE_CONNECTION_DB_PREFIX_NAME=evolution
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_NEW_MESSAGE=true
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_URL=https://www.bikesegurabc.com.br/api/webhook/evolution
      - WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS=false
      - WEBHOOK_EVENTS_APPLICATION_STARTUP=false
      - WEBHOOK_EVENTS_QRCODE_UPDATED=true
      - WEBHOOK_EVENTS_MESSAGES_SET=true
      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
      - CONFIG_SESSION_PHONE_CLIENT=BikeSeguraBC
      - CONFIG_SESSION_PHONE_NAME=Chrome
    volumes:
      - evolution_data:/evolution/instances
    networks:
      - bike-segura-net

  # Frontend (opcional - pode ser servido pela DigitalOcean separadamente)
  # Se quiser servir tudo junto, descomente:
  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: ../Dockerfile
  #   container_name: bike-segura-frontend
  #   restart: always
  #   ports:
  #     - "8080:8080"
  #   environment:
  #     - PORT=8080
  #   networks:
  #     - bike-segura-net

volumes:
  evolution_data:

networks:
  bike-segura-net:
    driver: bridge
